title: ORU Thesis Template
author: jsbam
version: 1.0.0
quarto-required: ">=1.8.0"
contributes:
  formats:
    typst:
      template-partials:
        - typst-template.typ
        - typst-show.typ
        - after-body.typ
      # Automatically copy required resources
      format-resources:
        - oru-logo-mono.svg
        - vancouver.csl
        - vancouver-author-date.csl
      # Default bibliography settings  
      reference-section-title: "References"
      csl: vancouver.csl
# rename template files to thesis.qmd upon installation
template:
  rename:
    template.qmd: thesis.qmd
